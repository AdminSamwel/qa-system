{% extends "base.html" %}
{% block content %}
<style>
    .chat-container {
        max-height: 400px;
        overflow-y: auto;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 15px;
        background: #f9f9f9;
        margin-bottom: 20px;
    }
    .chat-message {
        margin-bottom: 15px;
    }
    .chat-message.user {
        text-align: right;
    }
    .chat-message.bot {
        text-align: left;
    }
    .chat-bubble {
        display: inline-block;
        padding: 10px 15px;
        border-radius: 20px;
        max-width: 80%;
    }
    .user .chat-bubble {
        background-color: #009EDB;
        color: white;
    }
    .bot .chat-bubble {
        background-color: #e9ecef;
        color: #333;
    }
    .chat-input-group {
        position: sticky;
        bottom: 0;
        background: #fff;
    }
    .quick-replies {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }
    .quick-reply-chip {
        background-color: #e9ecef;
        border: 1px solid #ccc;
        border-radius: 20px;
        padding: 5px 12px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: background-color 0.2s;
    }
    .quick-reply-chip:hover {
        background-color: #009EDB;
        color: white;
        border-color: #009EDB;
    }
</style>

<div class="row">
    <div class="col-md-8">
        <h2><i class="fas fa-robot me-2 text-primary"></i>Virtual Assistant</h2>
        <div class="chat-container" id="chatBox">
            <div class="chat-message bot">
                <div class="chat-bubble">
                    Hello! I'm your QA assistant. How can I help today?<br>
                    <div class="quick-replies" style="margin-top:8px;">
                        <span class="quick-reply-chip" data-question="How to evaluate a course">Evaluate a course</span>
                        <span class="quick-reply-chip" data-question="Where to see reports">Find reports</span>
                        <span class="quick-reply-chip" data-question="How to change password">Change password</span>
                    </div>
                </div>
            </div>
        </div>
        <form id="chatForm" class="chat-input-group">
            <div class="input-group">
                <input type="text" id="chatInput" class="form-control" placeholder="Type your question..." autocomplete="off">
                <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i></button>
            </div>
        </form>
    </div>

    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-header bg-accent text-white">
                <h5 class="mb-0"><i class="fas fa-envelope me-2"></i>Send a Message</h5>
            </div>
            <div class="card-body">
                <form method="post" action="{{ url_for('main.send_message') }}">
                    <div class="mb-3">
                        <label class="form-label">Subject (optional)</label>
                        <input type="text" name="subject" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Message <span class="text-danger">*</span></label>
                        <textarea name="message" class="form-control" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100"><i class="fas fa-paper-plane"></i> Send</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const chatBox = document.getElementById('chatBox');
    const chatForm = document.getElementById('chatForm');
    const chatInput = document.getElementById('chatInput');

    // Handle form submit
    chatForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const message = chatInput.value.trim();
        if (!message) return;
        addMessage(message, 'user');
        chatInput.value = '';
        sendToBot(message);
    });

    // Handle quick reply clicks (delegate from chatBox)
    chatBox.addEventListener('click', function(e) {
        if (e.target.classList.contains('quick-reply-chip')) {
            const question = e.target.dataset.question;
            if (question) {
                addMessage(question, 'user');
                sendToBot(question);
            }
        }
    });

    function sendToBot(message) {
        fetch('/help/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: message })
        })
        .then(response => response.json())
        .then(data => {
            addMessage(data.reply, 'bot', data.suggestions);
        })
        .catch(error => {
            addMessage('Sorry, something went wrong. Please try again.', 'bot');
        });
    }

    function addMessage(text, sender, suggestions = []) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `chat-message ${sender}`;
        const bubble = document.createElement('div');
        bubble.className = 'chat-bubble';
        bubble.innerHTML = text;

        // Add quick reply chips if suggestions exist
        if (suggestions && suggestions.length > 0) {
            const chipsDiv = document.createElement('div');
            chipsDiv.className = 'quick-replies';
            suggestions.forEach(s => {
                const chip = document.createElement('span');
                chip.className = 'quick-reply-chip';
                chip.dataset.question = s;
                chip.textContent = s;
                chipsDiv.appendChild(chip);
            });
            bubble.appendChild(chipsDiv);
        }

        messageDiv.appendChild(bubble);
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
});
</script>
{% endblock %}
