{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-file-csv me-2"></i>Upload Users via CSV</h4>
            </div>
            <div class="card-body">
                <p>Select a CSV file with columns: <strong>username, email, full_name, role, password</strong>.</p>
                <p><a href="{{ url_for('admin.download_template') }}" class="btn btn-sm btn-outline-secondary"><i class="fas fa-download"></i> Download Template</a></p>
                <form method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <input type="file" name="csv_file" accept=".csv" class="form-control" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-upload"></i> Upload and Create Users</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
