{% extends "base.html" %}
{% block content %}
<div class="col-md-6 offset-md-3">
  <h2>{{ title }}</h2>
  <form method="post">
    {{ form.hidden_tag() }}
    <div class="mb-3">{{ form.name.label }} {{ form.name(class="form-control") }}</div>
    <div class="mb-3">{{ form.department_id.label }} {{ form.department_id(class="form-select") }}</div>
    <button type="submit" class="btn btn-primary">Save</button>
  </form>
</div>
{% endblock %}
