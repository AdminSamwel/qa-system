{% extends "base.html" %}
{% block content %}
<div class="col-md-6 offset-md-3">
  <h2>{{ title }}</h2>
  <form method="post">
    {{ form.hidden_tag() }}
    <div class="mb-3">{{ form.name.label }} {{ form.name(class="form-control") }}</div>
    <div class="mb-3">{{ form.location.label }} {{ form.location(class="form-control") }}</div>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('admin.list_campuses') }}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
