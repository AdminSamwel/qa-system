{% extends "base.html" %}
{% block content %}
<h2><i class="fas fa-building me-2"></i>Departments</h2>
<a href="{{ url_for('admin.add_department') }}" class="btn btn-primary mb-3">Add Department</a>
<table class="table">
<thead><tr><th>Name</th><th>Actions</th></tr></thead>
<tbody>
{% for d in departments %}
<tr>
<td>{{ d.name }}</td>
<td>
<a href="{{ url_for('admin.edit_department', dept_id=d.id) }}" class="btn btn-sm btn-outline-primary"><i class="fas fa-edit"></i></a>
<form method="post" action="{{ url_for('admin.delete_department', dept_id=d.id) }}" style="display:inline">
<button class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i></button>
</form>
</td>
</tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
