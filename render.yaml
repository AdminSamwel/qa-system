services:
  - type: web
    name: tpsc-qa-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: flask db upgrade && flask seed-db && flask seed-templates && gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tpsc-qa-db
          property: connectionString

databases:
  - name: tpsc-qa-db
    databaseName: tpsc_qa
    user: tpsc_admin
    plan: free
